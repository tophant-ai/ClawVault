# ClawVault Configuration
# Copy to ~/.claw-vault/config.yaml and customize

proxy:
  host: "127.0.0.1"
  port: 8765
  ssl_verify: true
  intercept_hosts:
    - "api.openai.com"
    - "api.anthropic.com"
    - "api.siliconflow.cn"
    - "*.openai.azure.com"
    - "generativelanguage.googleapis.com"

detection:
  enabled: true
  api_keys: true
  passwords: true
  private_ips: true
  pii: true
  # Custom detection patterns defined by users or generated via OpenClaw.
  # Example:
  # custom_patterns:
  #   - id: "cp-contract-pdf"
  #     name: "Contract PDF Upload"
  #     category: "GENERIC_SECRET"
  #     regex: "合同"
  #     risk_score: 6.5
  #     enabled: true
  #     description: "Trigger when user uploads content containing the word 合同"
  custom_patterns: []
  # Custom test cases to be shown in the Dashboard Test tab alongside built-ins.
  # Example:
  # custom_test_cases:
  #   - id: "tc-contract-pdf-1"
  #     name: "合同 PDF 上传检测"
  #     category: "sensitive"
  #     description: "Trigger when a合同PDFis uploaded for客服Agent"
  #     text: "用户上传了一个包含合同字样的 PDF 文件。"
  #     linked_pattern_ids:
  #       - "cp-contract-pdf"
  custom_test_cases: []

guard:
  mode: "permissive" # permissive | interactive | strict
  auto_sanitize: false
  blocked_domains: []

monitor:
  daily_token_budget: 50000
  monthly_token_budget: 1000000
  cost_alert_usd: 50.0

audit:
  retention_days: 7
  log_level: "INFO"
  export_format: "json"

dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 8766

cloud:
  enabled: false
  aiscc_api_url: "https://api.aiscc.io/v1/audit"
  aiscc_api_key: ""
